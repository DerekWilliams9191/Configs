set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

# Enable mouse support
set -g mouse on

# Intercept mouse drags to enter copy mode instead of sending to pane
unbind -n MouseDrag1Pane
bind -n MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"

##########################################################################################

# Use vi-style keys in copy mode
setw -g mode-keys vi

# Copy mode bindings (vi-style)
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# For copying to system clipboard (choose based on your OS)
# On macOS:
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# On Linux with xclip:
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard"

# On Linux with wl-clipboard (Wayland):
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"

##########################################################################################

# Use appropriate clipboard tool based on environment
if-shell '[ "$XDG_SESSION_TYPE" = "x11" ]' \
  'bind-key -T copy-mode-vi "y" send -X copy-pipe-and-cancel "xclip -selection clipboard"' \
  'if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" \
    "bind-key -T copy-mode-vi \"y\" send -X copy-pipe-and-cancel \"wl-copy\"" \
    "bind-key -T copy-mode-vi \"y\" send -X copy-pipe-and-cancel \"pbcopy\""'

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'fabioluciano/tmux-tokyo-night'


set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


# Start at 1
set -g base-index 1
set -g pane-base-index 1

