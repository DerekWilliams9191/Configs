set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

# Enable mouse support
set -g mouse on

# Preserve double-click to select word
#unbind -T root MouseDown1Pane
#bind -T root MouseDown1Pane select-pane -t = \; send-keys -M

# Only intercept actual drags (motion after click)
#unbind -T root MouseDrag1Pane
#bind -T root MouseDrag1Pane if-shell -F "#{pane_in_mode}" "send-keys -M" "copy-mode -M"

# Keep default double-click behavior
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Intercept drags to start copy mode
unbind -T root MouseDrag1Pane  
bind -T root MouseDrag1Pane copy-mode -M

##########################################################################################

# Use vi-style keys in copy mode
setw -g mode-keys vi

# Copy mode bindings (vi-style)
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# For copying to system clipboard (choose based on your OS)
# On macOS:
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# On Linux with xclip:
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard"

# On Linux with wl-clipboard (Wayland):
# bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"

##########################################################################################

# Use appropriate clipboard tool based on environment
if-shell '[ "$XDG_SESSION_TYPE" = "x11" ]' \
  'bind-key -T copy-mode-vi "y" send -X copy-pipe-and-cancel "xclip -selection clipboard"' \
  'if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" \
    "bind-key -T copy-mode-vi \"y\" send -X copy-pipe-and-cancel \"wl-copy\"" \
    "bind-key -T copy-mode-vi \"y\" send -X copy-pipe-and-cancel \"pbcopy\""'

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Persist last attached session name for remote-profile auto-reattach.
set-hook -g client-attached 'run-shell "tmux display-message -p \"#S\" > ~/.tmux-last-session"'
set-hook -g client-session-changed 'run-shell "tmux display-message -p \"#S\" > ~/.tmux-last-session"'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'fabioluciano/tmux-tokyo-night'

# Theme configuration (status bar only)
# `if-shell` runs in the tmux server's env, which may not have DOTFILES_PROFILE
# (the server inherits from whatever shell launched it — often a pre-existing
# shell that pre-dates ~/.zshenv). Source ~/.zshenv inline so the check works
# regardless of how tmux was started.
# Remote: gruvbox dark
if-shell '. ~/.zshenv 2>/dev/null; [ "$DOTFILES_PROFILE" = "remote" ]' \
  'set -g @powerkit_theme "gruvbox"; set -g @powerkit_theme_variant "dark"'

# Local: tokyo-night
if-shell '. ~/.zshenv 2>/dev/null; [ "$DOTFILES_PROFILE" != "remote" ]' \
  'set -g @powerkit_theme "tokyo-night"; set -g @powerkit_theme_variant "night"'

set -g @powerkit_status_position 'bottom'
set -g @powerkit_separator_style 'normal'
set -g @powerkit_edge_separator_style 'same'
set -g @powerkit_elements_spacing 'windows'

# Session icon
# Remote: (Server)
if-shell '. ~/.zshenv 2>/dev/null; [ "$DOTFILES_PROFILE" = "remote" ]' \
  'set -g @powerkit_session_icon "\uf233 "'
# Remote: (Cloud)
# if-shell '. ~/.zshenv 2>/dev/null; [ "$DOTFILES_PROFILE" = "remote" ]' \
#   'set -g @powerkit_session_icon "\uf0c2 "'

# Local: (Laptop)
if-shell '. ~/.zshenv 2>/dev/null; [ "$DOTFILES_PROFILE" != "remote" ]' \
  'set -g @powerkit_session_icon "\uf109 "'

# Prefix icon (keyboard when Ctrl+Space is pressed)
set -g @powerkit_session_prefix_icon "\uf11c "

# Copy mode icon (clipboard when in copy mode)
set -g @powerkit_session_copy_icon "\uf0c5 "

# Status bar plugins (bottom right section)
# Add or remove plugins by commenting/uncommenting lines, separate with commas
set -g @powerkit_plugins 'battery,cpu,memory,temperature'
set -g @powerkit_plugin_temperature_unit 'F'
# Available plugins: git, uptime, loadavg, disk, wifi, vpn, etc.

# Only load datetime widget (weather makes blocking HTTP calls that hang tmux startup)
set -g @theme_plugins 'datetime'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


# Start at 1
set -g base-index 1
set -g pane-base-index 1

set -g mode-style "fg=black,bg=yellow"

